# ============================================================
# Optional reverse-proxy gateway (docker compose --profile gateway up)
# ------------------------------------------------------------
# Single entrypoint on :80 that serves the web SPA and proxies the API
# under the same origin, so the browser bundle can call /api/v1 without
# CORS. When using the gateway, build web with VITE_API_BASE_URL=/api/v1.
#
#   /            -> web   (nginx static, port 80)
#   /api/        -> backend (NestJS, port 3000, prefix /api/v1)
#   /docs        -> backend swagger UI
#   /minio/      -> MinIO S3 (public poster objects)
# ============================================================

upstream web_upstream      { server web:80; }
upstream backend_upstream  { server backend:3000; }
upstream minio_upstream    { server minio:9000; }

server {
    listen 80;
    server_name _;

    # Posters can be large; allow generous uploads through the gateway.
    client_max_body_size 25m;

    # ---- API ----
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE for poster-generation progress streams.
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ---- Swagger / OpenAPI docs ----
    location /docs {
        proxy_pass       http://backend_upstream;
        proxy_set_header Host $host;
    }

    # ---- Public object storage (shareable posters) ----
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass       http://minio_upstream;
        proxy_set_header Host $host;
    }

    # ---- Web SPA (catch-all, fallback handled inside the web image) ----
    location / {
        proxy_pass       http://web_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
