server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with long cache.
    location /assets/ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the backend service.
    # Default targets the docker-compose service named "backend" on port 3000.
    # To change the target without rebuilding, mount your own conf or use the
    # nginx templating image (envsubst) and replace this with an env var.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every unknown route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
